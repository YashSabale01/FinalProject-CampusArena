version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "=== Installing frontend dependencies ==="
      - cd client && npm ci && cd ..
      - echo "=== Installing backend dependencies ==="
      - cd server && npm ci --production && cd ..

  pre_build:
    commands:
      - echo "=== Pre-build checks ==="
      - node --version
      - npm --version

  build:
    commands:
      - echo "=== Building React frontend ==="
      - cd client
      - CI=false npm run build
      - cd ..
      - echo "=== Backend ready (no compile needed for Node.js) ==="

  post_build:
    commands:
      - echo "=== Syncing frontend to S3 ==="
      - aws s3 sync ./client/build s3://$FRONTEND_BUCKET --delete
      - echo "=== Invalidating CloudFront cache ==="
      - aws cloudfront create-invalidation --distribution-id $CF_DISTRIBUTION_ID --paths "/*"
      - echo "=== Done ==="

# This artifact goes to CodeDeploy for backend deployment
artifacts:
  files:
    - server/**/*
    - appspec.yml
    - scripts/**/*
  discard-paths: no
