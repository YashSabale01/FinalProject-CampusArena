version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "=== Installing backend dependencies ==="
      - npm ci --prefix server --omit=dev --prefer-offline

  pre_build:
    commands:
      - echo "Node $(node -v) | NPM $(npm -v)"
      - echo "Build started at $(date)"

  build:
    commands:
      - echo "=== Building CodeDeploy artifact ==="
      - mkdir -p deploy/scripts deploy/app
      - cp server/appspec.yml deploy/appspec.yml
      - cp server/scripts/before_install.sh deploy/scripts/
      - cp server/scripts/after_install.sh deploy/scripts/
      - cp server/scripts/start_app.sh deploy/scripts/
      - cp server/scripts/validate_service.sh deploy/scripts/
      - chmod +x deploy/scripts/*.sh
      - rsync -a server/ deploy/app/ --exclude='.git' --exclude='buildspec.yml' --exclude='appspec.yml' --exclude='scripts'
      - echo "=== Artifact structure ==="
      - ls -la deploy/
      - ls -la deploy/scripts/
      - ls -la deploy/app/

  post_build:
    commands:
      - echo "=== Backend build complete ==="

artifacts:
  files:
    - "**/*"
  base-directory: deploy
  discard-paths: no

cache:
  paths:
    - server/node_modules/**/*
