version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "=== Installing backend dependencies ==="
      - cd server
      - npm ci --only=production --prefer-offline

  pre_build:
    commands:
      - echo "=== Pre-build checks ==="
      - node -v
      - npm -v
      - echo "Build started at $(date)"

  build:
    commands:
      - echo "=== Packaging backend for CodeDeploy ==="
      - chmod +x server/scripts/*.sh 2>/dev/null || true

  post_build:
    commands:
      - echo "=== Backend build complete ==="

artifacts:
  files:
    - server/**/*
    - server/appspec.yml
  discard-paths: no

cache:
  paths:
    - server/node_modules/**/*
