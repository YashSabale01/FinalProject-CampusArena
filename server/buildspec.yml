version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "=== Installing backend dependencies ==="
      - npm ci --prefix server --only=production --prefer-offline

  pre_build:
    commands:
      - echo "=== Pre-build checks ==="
      - node -v
      - npm -v
      - echo "Build started at $(date)"

  build:
    commands:
      - echo "=== Restructuring artifact for CodeDeploy ==="
      - mkdir -p deploy/scripts deploy/app
      - cp server/appspec.yml deploy/appspec.yml
      - cp server/scripts/*.sh deploy/scripts/
      - chmod +x deploy/scripts/*.sh
      - rsync -a --exclude='.git' server/ deploy/app/

  post_build:
    commands:
      - echo "=== Build complete ==="
      - ls -la deploy/
      - ls deploy/scripts/

artifacts:
  files:
    - "**/*"
  base-directory: deploy
  discard-paths: no

cache:
  paths:
    - server/node_modules/**/*
