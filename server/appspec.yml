version: 0.0
os: linux
 
files:
  - source: /app
    destination: /opt/campusarena/server
 
hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 60
      runas: root
 
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 120
      runas: root
 
  ApplicationStart:
    - location: scripts/start_app.sh
      timeout: 120
      runas: root
 
  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 180
      runas: root
 
