version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "=== Installing frontend dependencies ==="
      - npm ci --prefix client --prefer-offline

  pre_build:
    commands:
      - echo "API URL is $REACT_APP_API_URL"
      - echo "Build started at $(date)"

  build:
    commands:
      - echo "=== Building React app ==="
      - npm run build --prefix client

  post_build:
    commands:
      - echo "=== Syncing to S3 ==="
      - aws s3 sync client/build/ s3://$FRONTEND_BUCKET --delete --exact-timestamps
      - aws s3 cp s3://$FRONTEND_BUCKET/index.html s3://$FRONTEND_BUCKET/index.html --metadata-directive REPLACE --cache-control "no-cache, no-store, must-revalidate" --content-type "text/html"
      - echo "=== Invalidating CloudFront cache ==="
      - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DISTRIBUTION_ID --paths "/*"
      - echo "=== Frontend deployment complete ==="

artifacts:
  files:
    - "**/*"
  base-directory: client/build
  discard-paths: no

cache:
  paths:
    - client/node_modules/**/*
